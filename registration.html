<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Coding Bootcamp</title>
    <link rel="stylesheet" href="../cssFile/globalStyles.css">
</head>
<body>
    <nav class="navbar navbar-main">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">CodeBootcamp</a>
            <ul class="nav-menu nav-active">
                <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="course-catalog.html" class="nav-link">Courses</a></li>
                <li class="nav-item"><a href="about-us.html" class="nav-link">About</a></li>
                <li class="nav-item"><a href="registration.html" class="nav-link nav-link-cta">Get Started</a></li>
            </ul>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </nav>

    <section class="auth-section auth-main">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-logo">🎓 CodeBootcamp</div>
                <div class="auth-header">
                    <h2 id="authTitle">Welcome Back</h2>
                    <p id="authSubtitle">Sign in to continue</p>
                </div>

                <div class="form-panel active" id="signinPanel">
                    <form id="signinForm">
                        <div><label>Email *</label><input type="email" placeholder="you@example.com" required></div>
                        <div><label>Password *</label><input type="password" placeholder="Enter password" required></div>
                        <button type="submit" class="auth-btn">Sign In</button>
                    </form>
                    <div class="auth-switch"><p>No account? <button class="auth-switch-btn" onclick="switchPanel()">Sign Up</button></p></div>
                </div>

                <div class="form-panel" id="signupPanel">
                    <form id="signupForm">
                        <div><label>Full Name *</label><input type="text" placeholder="John Doe" required></div>
                        <div><label>Email *</label><input type="email" placeholder="you@example.com" required></div>
                        <div><label>Password *</label><input type="password" placeholder="Min. 8 chars" required></div>
                        <div><label>Confirm Password *</label><input type="password" placeholder="Re-enter password" required></div>
                        <button type="submit" class="auth-btn">Create Account</button>
                    </form>
                    <div class="auth-switch"><p>Have account? <button class="auth-switch-btn" onclick="switchPanel()">Sign In</button></p></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer footer-main">
        <div class="footer-container">
            <div class="footer-section"><h4 class="footer-title">CodeBootcamp</h4><p class="footer-text">Your gateway to coding success</p></div>
            <div class="footer-section"><h4 class="footer-title">Links</h4><ul class="footer-links"><li><a href="course-catalog.html" class="footer-link">Courses</a></li><li><a href="about-us.html" class="footer-link">About</a></li></ul></div>
        </div>
        <div class="footer-bottom"><p class="footer-copyright">&copy; 2024 CodeBootcamp. All rights reserved.</p></div>
    </footer>

    <script src="../jsFile/jsFunctions.js"></script>
    <script>
        function switchPanel() {
            const signin = document.getElementById('signinPanel');
            const signup = document.getElementById('signupPanel');
            signin.classList.toggle('active');
            signup.classList.toggle('active');
            document.getElementById('authTitle').textContent = signin.classList.contains('active') ? 'Welcome Back' : 'Create Account';
            document.getElementById('authSubtitle').textContent = signin.classList.contains('active') ? 'Sign in to continue' : 'Join us today';
        }
        document.getElementById('signinForm').addEventListener('submit', (e) => {
            e.preventDefault();
            showMessage('Signed in! Redirecting...', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 1500);
        });
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            showMessage('Account created!', 'success');
            document.getElementById('signupForm').reset();
        });
    </script>
</body>
</html>
